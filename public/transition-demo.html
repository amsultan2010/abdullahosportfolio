<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick a Transition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #111; color: #fff; min-height: 100vh; }

  .controls {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .controls h3 { font-size: 14px; font-weight: 700; min-width: 200px; }
  .controls button {
    padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; cursor: pointer;
    font-family: inherit; font-weight: 600; transition: all 0.15s;
  }
  .controls button:hover { background: rgba(255,255,255,0.15); }
  .controls button.active { background: #0071e3; border-color: #0071e3; }
  .play-btn {
    padding: 10px 24px !important; background: #30d158 !important; border-color: #30d158 !important;
    font-size: 14px !important; border-radius: 20px !important;
  }
  .play-btn:hover { background: #28b84c !important; }

  .stage {
    width: 100vw; height: calc(100vh - 64px); position: relative; overflow: hidden;
  }

  /* Desktop layer (behind) */
  .desktop {
    position: absolute; inset: 0;
    background: url(/images/wallpaper/wallpaper.jpg) center/cover no-repeat;
  }
  .desktop::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.1);
  }
  .desktop-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 28px; font-weight: 800; color: rgba(255,255,255,0.3);
    letter-spacing: 8px; z-index: 1;
  }

  /* Portfolio page (on top) */
  .page {
    position: absolute; inset: 0; background: #f5f5f4; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    will-change: transform, opacity, clip-path;
  }
  .page h1 { font-size: 42px; font-weight: 800; color: #1d1d1f; letter-spacing: -1px; }
  .page p { font-size: 16px; color: rgba(0,0,0,0.5); margin-top: 4px; }
  .page .hint { font-size: 13px; color: rgba(0,0,0,0.3); margin-top: 24px; }

  /* ═══════════ ANIMATIONS ═══════════ */

  /* 1: Slide Up */
  .anim-1 { animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes slideUp {
    to { transform: translateY(-100%); }
  }

  /* 2: Slide to Top-Left (diagonal) */
  .anim-2 { animation: slideTL 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes slideTL {
    to { transform: translate(-100%, -100%); }
  }

  /* 3: Shrink & Fade (card pull-away) */
  .anim-3 { animation: shrinkFade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes shrinkFade {
    40% { transform: scale(0.92); border-radius: 16px; opacity: 1; }
    100% { transform: scale(0.85) translateY(30px); border-radius: 24px; opacity: 0; }
  }

  /* 4: Flip (page turn on Y axis from right edge) */
  .anim-4 {
    transform-origin: left center;
    animation: flipLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes flipLeft {
    to { transform: perspective(1200px) rotateY(-90deg); }
  }

  /* 5: Iris / Circle wipe (reveal from center) */
  .anim-5 { animation: irisOut 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes irisOut {
    0% { clip-path: circle(100% at 50% 50%); }
    100% { clip-path: circle(0% at 50% 50%); }
  }

  /* 6: Iris from top-right corner */
  .anim-6 { animation: irisCorner 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes irisCorner {
    0% { clip-path: circle(150% at 100% 0%); }
    100% { clip-path: circle(0% at 100% 0%); }
  }

  /* 7: Diagonal wipe (top-right to bottom-left) */
  .anim-7 { animation: diagWipe 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes diagWipe {
    0% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    100% { clip-path: polygon(0 0, 0 0, 0 0, 0 0); }
  }

  /* 8: Split horizontal (pages open like a book) */
  .anim-8 { animation: none; }
  .anim-8::before, .anim-8::after {
    content: ''; position: absolute; top: 0; width: 50%; height: 100%;
    background: #f5f5f4; z-index: 1;
  }
  .anim-8::before { left: 0; animation: splitL 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }
  .anim-8::after { right: 0; animation: splitR 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }
  @keyframes splitL { to { transform: translateX(-100%); } }
  @keyframes splitR { to { transform: translateX(100%); } }
  .anim-8 > * { animation: fadeOutQuick 0.3s 0.1s forwards; }
  @keyframes fadeOutQuick { to { opacity: 0; } }

  /* 9: Zoom through (page zooms into you) */
  .anim-9 { animation: zoomThru 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes zoomThru {
    to { transform: scale(3); opacity: 0; }
  }

  /* 10: Page peel — corner fold with shadow */
  .anim-10 {
    animation: peelCorner 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    transform-origin: bottom left;
  }
  @keyframes peelCorner {
    0% {
      transform: perspective(1500px) rotateY(0deg);
      box-shadow: none;
    }
    30% {
      transform: perspective(1500px) rotateY(-20deg);
      box-shadow: -10px 0 30px rgba(0,0,0,0.15);
    }
    100% {
      transform: perspective(1500px) rotateY(-90deg);
      box-shadow: -20px 0 60px rgba(0,0,0,0.2);
    }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="desktop">
    <div class="desktop-label">DESKTOP</div>
  </div>
  <div class="page" id="page">
    <h1>Abdullah Sultan</h1>
    <p>Software Engineer</p>
    <div class="hint">click "Play" to preview each transition</div>
  </div>
</div>

<div class="controls">
  <h3 id="label">1. Slide Up</h3>
  <button class="active" onclick="pick(1)">1</button>
  <button onclick="pick(2)">2</button>
  <button onclick="pick(3)">3</button>
  <button onclick="pick(4)">4</button>
  <button onclick="pick(5)">5</button>
  <button onclick="pick(6)">6</button>
  <button onclick="pick(7)">7</button>
  <button onclick="pick(8)">8</button>
  <button onclick="pick(9)">9</button>
  <button onclick="pick(10)">10</button>
  <button class="play-btn" onclick="play()">▶ Play</button>
</div>

<script>
const names = {
  1: 'Slide Up',
  2: 'Diagonal Slide (top-left)',
  3: 'Shrink & Fade (card)',
  4: 'Page Flip (book turn)',
  5: 'Iris Wipe (center)',
  6: 'Iris Wipe (top-right corner)',
  7: 'Diagonal Wipe',
  8: 'Split Open (book)',
  9: 'Zoom Through',
  10: 'Page Peel (3D fold)',
};
let current = 1;

function pick(n) {
  current = n;
  document.getElementById('label').textContent = n + '. ' + names[n];
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.controls button')[n - 1].classList.add('active');
  reset();
}

function reset() {
  const page = document.getElementById('page');
  const clone = page.cloneNode(true);
  clone.className = 'page';
  clone.id = 'page';
  page.parentNode.replaceChild(clone, page);
}

function play() {
  reset();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById('page').classList.add('anim-' + current);
    });
  });
  // Auto-reset after animation
  setTimeout(reset, 1200);
}
</script>
</body>
</html>
